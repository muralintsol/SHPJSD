<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF6EE"/>
      <stop offset="100%" stop-color="#F0E6D8"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#C45C26"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="600" height="4" fill="url(#g)"/>
  <text x="300" y="45" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#3D2314">Sumangali Home Foods  Brand Collection</text>
  <text x="300" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#9B4E2A">Artisan packaging for authentic taste lovers</text>
  <!-- pouch -->
  <rect x="30" y="100" width="110" height="160" rx="6" fill="#E8D4B8" stroke="#9B4E2A" stroke-width="1"/>
  <rect x="45" y="120" width="80" height="50" rx="3" fill="#FBF6EE" stroke="#E8A838" stroke-width="1"/>
  <text x="85" y="155" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#3D2314">Chutney</text>
  <text x="85" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5C7A52">Kraft Pouch</text>
  <!-- jar -->
  <ellipse cx="200" cy="115" rx="35" ry="10" fill="#E8A838"/>
  <path d="M170 115 L165 250 Q200 265 235 250 L230 115 Z" fill="#E8F5E4" stroke="#5C7A52" stroke-width="1.5"/>
  <text x="200" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#C45C26">Pickle</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5C7A52">Glass Jar</text>
  <!-- box -->
  <rect x="270" y="130" width="120" height="90" rx="4" fill="#F5E6D0" stroke="#9B4E2A" stroke-width="1.5"/>
  <rect x="270" y="130" width="120" height="22" fill="#C45C26"/>
  <text x="330" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="white">Sumangali</text>
  <text x="330" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#3D2314">Laddu Box</text>
  <text x="330" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5C7A52">Gift-Ready</text>
  <!-- bag -->
  <path d="M420 100 L530 100 L545 260 L405 260 Z" fill="#D4C4A8" stroke="#9B4E2A" stroke-width="1.5"/>
  <text x="475" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#3D2314">Protein</text>
  <text x="475" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5C7A52">Stand-Up Bag</text>
  <!-- label -->
  <rect x="180" y="310" width="240" height="70" rx="8" fill="#FBF6EE" stroke="url(#g)" stroke-width="2"/>
  <circle cx="220" cy="345" r="18" fill="#FBF6EE" stroke="#E8A838" stroke-width="1.5"/>
  <ellipse cx="220" cy="347" rx="10" ry="7" fill="#E8A838"/>
  <text x="310" y="335" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#3D2314">Heritage Label Design</text>
  <text x="310" y="355" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#5C7A52">Handcrafted · Women-Led · No Preservatives</text>
</svg>
