<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none" role="img" aria-label="Sumangali Home Foods">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#C45C26"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C7A52"/>
      <stop offset="100%" stop-color="#6B8F5E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FBF6EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="120" fill="#FBF6EE" rx="10"/>
  <!-- Brand mark -->
  <circle cx="60" cy="60" r="46" fill="url(#glow)"/>
  <circle cx="60" cy="60" r="40" fill="#FFFDF9" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="32" fill="none" stroke="#E8A838" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.4"/>
  <path d="M28 44 Q60 26 92 44" stroke="#C45C26" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="60" cy="66" rx="17" ry="12" fill="url(#gold)"/>
  <path d="M45 62 Q60 54 75 62" stroke="#9B4E2A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M46 48 Q50 40 54 48" stroke="url(#leaf)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 46 Q70 38 74 46" stroke="url(#leaf)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="118" y="52" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="700" fill="#3D2314" letter-spacing="-0.5">Sumangali</text>
  <text x="118" y="74" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#5C7A52" letter-spacing="5">HOME FOODS</text>
  <line x1="118" y1="82" x2="310" y2="82" stroke="#E8A838" stroke-width="1.5" stroke-linecap="round"/>
  <text x="118" y="104" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#9B4E2A">Preserving Authentic Tastes for Future Generations</text>
</svg>
